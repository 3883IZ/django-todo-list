<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Todo List</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-2 bg-light vh-100">
            <h4 class="mt-3">Menu</h4>
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'todo:task-list' %}">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'todo:tag-list' %}">Tags</a>
                </li>
            </ul>
        </div>

        <!-- Main content -->
        <div class="col-10 p-4">
            {% block content %}
            {% endblock %}
        </div>
    </div>
</div>
</body>
</html>
