{% extends "todo/base.html" %}

{% block content %}
<h2>Tags</h2>

<a href="{% url 'todo:tag-add' %}" class="btn btn-primary mb-3">Add new tag</a>

<table class="table table-striped">
    <thead>
        <tr>
            <th>Name</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for tag in tags %}
        <tr>
            <td>{{ tag.name }}</td>
            <td>
                <a href="{% url 'todo:tag-update' tag.id %}" class="btn btn-sm btn-warning">Update</a>
                <a href="{% url 'todo:tag-delete' tag.id %}" class="btn btn-sm btn-danger">Delete</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="2">No tags yet.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
